<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로또 번호 생성기</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>로또 번호 생성기</h1>
        <p class="subtitle">오늘의 행운을 확인해보세요</p>
        <button id="generate-btn">번호 생성하기</button>
        <div id="lotto-container">
            <!-- 로또 번호 세트가 여기에 표시됩니다 -->
        </div>

        <div class="contact-section">
            <h2>제휴 문의</h2>
            <p class="subtitle">협업 및 제휴 제안을 기다립니다</p>
            <form action="https://formspree.io/f/mojbkopo" method="POST">
                <div class="form-group">
                    <input type="text" name="name" placeholder="성함/업체명" required>
                </div>
                <div class="form-group">
                    <input type="email" name="_replyto" placeholder="이메일 주소" required>
                </div>
                <div class="form-group">
                    <textarea name="message" placeholder="문의 내용" required></textarea>
                </div>
                <button type="submit" class="submit-btn">문의 보내기</button>
            </form>
        </div>

        <div id="disqus_thread" style="margin-top: 4rem;"></div>
        <script>

        <noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>
    </div>
    <script src="main.js"></script>
</body>
</html>
